<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Idul Adha Modern</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Poppins',sans-serif;
}

body{
    overflow:hidden;
    background:#020617;
}

/* ================= HALAMAN PERTAMA ================= */

.page1{
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;

    background:
    radial-gradient(circle at top left,#1d4d4f,#0f172a 60%);

    position:relative;
}

/* Blur Background */
.blur1,
.blur2{
    position:absolute;
    border-radius:50%;
    filter:blur(90px);
}

.blur1{
    width:300px;
    height:300px;
    background:#22c55e;
    top:-100px;
    left:-100px;
}

.blur2{
    width:350px;
    height:350px;
    background:#06b6d4;
    bottom:-120px;
    right:-100px;
}

/* Stars */
.star{
    position:absolute;
    width:3px;
    height:3px;
    background:white;
    border-radius:50%;
    animation:blink 2s infinite;
}

@keyframes blink{

    0%,100%{
        opacity:0.2;
    }

    50%{
        opacity:1;
    }

}

/* Moon */
.moon{
    position:absolute;
    top:70px;
    right:100px;

    width:140px;
    height:140px;
    border-radius:50%;

    background:
    radial-gradient(circle at 30% 30%,
    #ffffff,
    #f1f5f9,
    #cbd5e1);

    box-shadow:
    -30px 0 0 18px #0f172a,
    0 0 30px rgba(255,255,255,0.4),
    0 0 80px rgba(255,255,255,0.2);

    animation:float 4s ease-in-out infinite;
}

@keyframes float{

    0%,100%{
        transform:translateY(0px);
    }

    50%{
        transform:translateY(-15px);
    }

}

/* Card */
.card{
    width:430px;
    padding:40px;
    border-radius:30px;

    background:rgba(255,255,255,0.08);

    backdrop-filter:blur(18px);

    border:1px solid rgba(255,255,255,0.15);

    box-shadow:
    0 8px 32px rgba(0,0,0,0.3);

    text-align:center;
    color:white;

    z-index:10;

    animation:fadeUp 1.5s ease;
}

@keyframes fadeUp{

    from{
        opacity:0;
        transform:translateY(50px);
    }

    to{
        opacity:1;
        transform:translateY(0);
    }

}

/* Judul */
.title{
    display:flex;
    justify-content:center;
    align-items:center;
    gap:12px;
}

.title-icon{
    font-size:40px;
    animation:iconFloat 3s ease-in-out infinite;
}

@keyframes iconFloat{

    0%,100%{
        transform:translateY(0);
    }

    50%{
        transform:translateY(-8px);
    }

}

.title h1{
    font-size:42px;

    background:
    linear-gradient(to right,#ffffff,#d1fae5);

    -webkit-background-clip:text;
    -webkit-text-fill-color:transparent;
}

/* Subtitle */
.subtitle{
    margin-top:20px;
    color:#d1d5db;
    letter-spacing:2px;
}

/* Typing */
.typing{
    overflow:hidden;
    white-space:nowrap;
    width:0;
    margin:auto;
    border-right:3px solid white;

    animation:
    typing 4s steps(30,end) forwards,
    blinkCursor .7s infinite;
}

@keyframes typing{

    from{
        width:0;
    }

    to{
        width:100%;
    }

}

@keyframes blinkCursor{

    50%{
        border-color:transparent;
    }

}

/* Message */
.message{
    margin-top:25px;
    line-height:1.9;
    color:#f8fafc;
}

/* Button */
.btn{
    display:inline-block;
    margin-top:30px;
    padding:14px 32px;

    border:none;
    border-radius:50px;

    background:
    linear-gradient(to right,#22c55e,#06b6d4);

    color:white;
    font-weight:600;
    font-size:16px;

    cursor:pointer;
    transition:0.4s;
}

.btn:hover{

    transform:scale(1.05);

    box-shadow:
    0 10px 25px rgba(34,197,94,0.4);

}

/* Floating Icons */
.icon{
    position:absolute;
    font-size:32px;
    animation:floatIcon 6s ease-in-out infinite;
}

.i1{
    top:120px;
    left:120px;
}

.i2{
    bottom:120px;
    left:180px;
    animation-delay:2s;
}

@keyframes floatIcon{

    0%,100%{
        transform:translateY(0);
    }

    50%{
        transform:translateY(-20px);
    }

}

/* ================= HALAMAN KEDUA ================= */

.page2{
    position:fixed;
    inset:0;

    background:black;

    display:none;
    justify-content:center;
    align-items:center;

    overflow:hidden;
}

/* Tulisan */
.fire-title{
    position:absolute;

    font-size:70px;
    font-weight:bold;

    color:white;

    text-shadow:
    0 0 20px gold,
    0 0 40px orange,
    0 0 70px red;

    z-index:10;

    animation:glow 2s infinite alternate;
}

@keyframes glow{

    from{
        text-shadow:
        0 0 20px gold,
        0 0 40px orange;
    }

    to{
        text-shadow:
        0 0 30px white,
        0 0 60px gold,
        0 0 90px red;
    }

}

/* Percikan Kembang Api */
.firework{
    position:absolute;
    width:5px;
    height:5px;
    border-radius:50%;

    animation:burst 1s ease-out forwards;
}

/* Ledakan */
@keyframes burst{

    0%{
        transform:translate(0,0) scale(1);
        opacity:1;
    }

    100%{

        transform:
        translate(
            calc(var(--x) * 140px),
            calc(var(--y) * 140px)
        )
        scale(0);

        opacity:0;
    }

}

/* Responsive */
@media(max-width:500px){

.card{
    width:90%;
    padding:30px;
}

.title h1{
    font-size:34px;
}

.fire-title{
    font-size:40px;
    text-align:center;
    padding:20px;
}

.moon{
    width:100px;
    height:100px;
    right:30px;
}

}

</style>
</head>

<body>

<!-- ================= HALAMAN PERTAMA ================= -->

<div class="page1" id="page1">

    <!-- Blur -->
    <div class="blur1"></div>
    <div class="blur2"></div>

    <!-- Stars -->
    <div class="star" style="top:10%; left:20%;"></div>
    <div class="star" style="top:20%; left:70%;"></div>
    <div class="star" style="top:40%; left:80%;"></div>
    <div class="star" style="top:70%; left:15%;"></div>
    <div class="star" style="top:85%; left:65%;"></div>

    <!-- Moon -->
    <div class="moon"></div>

    <!-- Floating Icons -->
    <div class="icon i1">✨</div>
    <div class="icon i2">🌙</div>

    <!-- Card -->
    <div class="card">

        <!-- Judul -->
        <div class="title">

            <span class="title-icon">🕌</span>

            <h1>Idul Adha</h1>

        </div>

        <!-- Subtitle -->
        <p class="subtitle typing">
            Selamat Hari Raya Idul Adha 1447 H
        </p>

        <!-- Message -->
        <div class="message">

            Semoga hari yang suci ini membawa
            kedamaian, kebahagiaan,
            keberkahan, dan mempererat
            tali silaturahmi di antara kita semua.

            <br><br>

            Mohon Maaf Lahir dan Batin 🤍

        </div>

        <!-- Button -->
        <button class="btn" onclick="bukaHalaman2()">

            ✨ Selamat Merayakan

        </button>

    </div>

</div>

<!-- ================= HALAMAN KEDUA ================= -->

<div class="page2" id="page2">

    <div class="fire-title">

        🕌 SELAMAT IDUL ADHA 🌙

    </div>

</div>

<script>

/* Membuka halaman kedua */
function bukaHalaman2(){

    document.getElementById("page1").style.display = "none";

    document.getElementById("page2").style.display = "flex";

    buatKembangApi();
}

/* Efek percikan kembang api */
function buatKembangApi(){

    setInterval(() => {

        const centerX =
        Math.random() * window.innerWidth;

        const centerY =
        Math.random() * window.innerHeight;

        for(let i = 0; i < 50; i++){

            const firework =
            document.createElement("div");

            firework.classList.add("firework");

            firework.style.left =
            centerX + "px";

            firework.style.top =
            centerY + "px";

            firework.style.background =
            `hsl(${Math.random()*360},100%,60%)`;

            /* arah percikan */
            const angle =
            Math.random() * Math.PI * 2;

            const x = Math.cos(angle);
            const y = Math.sin(angle);

            firework.style.setProperty("--x", x);
            firework.style.setProperty("--y", y);

            document
            .getElementById("page2")
            .appendChild(firework);

            setTimeout(() => {

                firework.remove();

            },1000);

        }

    },500);

}

</script>

</body>
</html>
